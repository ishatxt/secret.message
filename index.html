<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Secret message🎀</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Lovers+Quarrel&family=Press+Start+2P&display=swap" rel="stylesheet">
  
  <style>
    /* Integrated Styles from frontendfocus.css and Lock Screen */
    :root {
      --bg: #fff0f5;
      --deep: #e8547a;
      --pixel: #c94368;
      --text: #5a4a4d;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at center, #0f2027, #203a43, #2c5364);
      font-family: 'Poppins', sans-serif;
      overflow: hidden;
    }

    /* --- Lock Screen Styles --- */
    #lock-screen {
      position: fixed; 
      inset: 0;
      background: var(--bg);
      display: flex; 
      flex-direction: column;
      align-items: center; 
      justify-content: center;
      z-index: 1000;
      gap: 20px;
      transition: opacity .6s ease;
    }

    .lock-title {
      font-family: 'Press Start 2P', cursive;
      font-size: 14px;
      color: var(--deep);
      text-shadow: 2px 2px 0 rgba(232,84,122,.2);
    }

    #pass {
      font-family: 'Press Start 2P', monospace;
      font-size: 12px;
      padding: 14px;
      border: 3px solid #ff8fa3;
      background: #fffbfc;
      text-align: center;
      box-shadow: 4px 4px 0 var(--deep);
      outline: none;
    }

    .a-float { animation: lockFloat 2s ease-in-out infinite; }
    @keyframes lockFloat { 
      0%, 100% { transform: translateY(0) rotate(-2deg); } 
      50% { transform: translateY(-12px) rotate(2deg); } 
    }

    /* --- 3D Book Styles --- */
    .book {
      display: none; /* Hidden until password is correct */
      perspective: 200vw;
      transition: opacity 0.4s 0.2s;
    }

    .pages {
      width: 60vw;
      height: 44vw;
      position: relative;
      transform-style: preserve-3d;
      backface-visibility: hidden;
      border-radius: 8px;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.3);
    }

    .page {
      position: absolute;
      top: 0;
      width: 30vw;
      height: 44vw;
      transform-origin: left;
      transition: transform 1.2s ease-in-out;
      backface-visibility: hidden;
      border-radius: 8px;
      cursor: pointer;
      user-select: none;
      background: #faf8f6 url('https://www.transparenttextures.com/patterns/paper-fibers.png');
      box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.05);
    }

    .page:nth-child(odd) { transform-origin: left; right: 0; background-image: linear-gradient(to right, rgba(0,0,0,0.1), rgba(0,0,0,0)); }
    .page:nth-child(even) { transform-origin: right; left: 0; transform: rotateY(180deg); background-image: linear-gradient(to left, rgba(0,0,0,0.1), rgba(0,0,0,0)); }
    
    .page.flipped:nth-child(odd) { transform: rotateY(-180deg); }
    .page.flipped:nth-child(even) { transform: rotateY(0deg); }

    .page p {
      font-family: 'Lovers Quarrel', cursive;
      text-align: center;
      font-size: 4vw;
      margin: 0;
      color: #333;
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }

    @media (max-width: 768px) {
      .pages { width: 90vw; height: 65vw; }
      .page { width: 45vw; height: 65vw; }
    }
  </style>
</head>
<body>

<div id="lock-screen">
  <img class="a-float" 
       src="cat-pixel.gif" 
       alt="Pixel Cat" 
       style="width: 120px; height: auto; image-rendering: pixelated;">
  
  <h1 class="lock-title">Enter Password</h1>
  <input type="password" id="pass" placeholder="type here" oninput="checkPass()" autocomplete="off">
</div>

<div class="book" id="book-container">
  <div id="pages" class="pages">
    <div class="page"><p>Open Me,<br>please!</p></div>
    <div class="page"></div>
    <div class="page"><p>Hello there!</p></div>
    <div class="page"><p>Page 1</p></div>
    <div class="page"><p>Page 2</p></div>
    <div class="page"><p>Page 3</p></div>
    <div class="page"><p>Page 4</p></div>
    <div class="page"><p>Page 5</p></div>
    <div class="page"><p>Page 6</p></div>
    <div class="page"><p>Page 7</p></div>
    <div class="page"><p>Page 8</p></div>
    <div class="page"><p>Page 9</p></div>
    <div class="page"><p>Page 10</p></div>
    <div class="page"><p>Page 11</p></div>
    <div class="page"><p>Page 12</p></div>
    <div class="page"><p>Page 13</p></div>
    <div class="page"><p>Page 14</p></div>
  </div>
</div>

<script>
  // Password Logic
  function checkPass() {
    if (document.getElementById('pass').value.toLowerCase() === 'seramma') {
      const lock = document.getElementById('lock-screen');
      lock.style.opacity = '0';
      setTimeout(() => {
        lock.style.display = 'none';
        document.getElementById('book-container').style.display = 'block';
      }, 600);
    }
  }

  // Book Logic from frontendfocus.js
  const pages = document.querySelectorAll('.page');
  for (let i = 0; i < pages.length; i++) {
    if (i % 2 === 0) pages[i].style.zIndex = pages.length - i;
  }

  pages.forEach((page, index) => {
    page.pageNum = index + 1;
    page.addEventListener('click', function() {
      if (this.pageNum % 2 === 0) {
        this.classList.remove('flipped');
        this.previousElementSibling.classList.remove('flipped');
      } else {
        this.classList.add('flipped');
        this.nextElementSibling.classList.add('flipped');
      }
    });
  });
</script>
</body>
</html>
